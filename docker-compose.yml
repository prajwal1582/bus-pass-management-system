version: '3.8'
services:
  mongodb:
    image: mongo:6
    container_name: buspass-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: buspass-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/buspassdb
      - JWT_SECRET=buspass_secret_key_2024
      - PORT=5000
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: buspass-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
